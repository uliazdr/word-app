<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vocab Trainer</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding:40px;
}

button{
padding:14px;
margin:8px;
font-size:16px;
width:220px;
border:none;
border-radius:8px;
background:#2d7ef7;
color:white;
}

button:hover{
opacity:0.9;
}

input{
padding:10px;
margin:6px;
font-size:16px;
width:220px;
}

#screen{
margin-top:30px;
}
</style>

</head>

<body>

<h2>Vocab Trainer</h2>

<div id="login">

<input id="email" placeholder="email"><br>
<input id="password" type="password" placeholder="password"><br>

<button onclick="login()">Login</button>

</div>

<div id="app" style="display:none">

<button onclick="startDictation()">Start dictation</button><br>
<button onclick="showWords()">Manage word list</button><br>
<button onclick="showProgress()">Progress</button>

<div id="screen"></div>

</div>

<script>

const firebaseConfig = {
apiKey: "API_KEY",
authDomain: "vocabtrainer-969fd.firebaseapp.com",
databaseURL: "https://vocabtrainer-969fd-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "vocabtrainer-969fd"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let words = [];

auth.onAuthStateChanged(user => {

if(user){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

loadWords();

}

});

function login(){

const email=document.getElementById("email").value;
const pass=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,pass);

}

function loadWords(){

db.ref("words").once("value").then(snap=>{

const data=snap.val();

if(!data){
words=[];
return;
}

words=Object.values(data);

console.log("words loaded",words);

});

}

function startDictation(){

if(words.length===0){

document.getElementById("screen").innerHTML="No words in database";
return;

}

let w=words[Math.floor(Math.random()*words.length)];

document.getElementById("screen").innerHTML=

"<h3>"+w.text+"</h3>"+
"<button onclick='markWrong()'>Wrong</button>"+
"<button onclick='markRight()'>Correct</button>";

}

function markWrong(){

document.getElementById("screen").innerHTML="marked wrong";

}

function markRight(){

document.getElementById("screen").innerHTML="marked correct";

}

function showWords(){

db.ref("words").once("value").then(snap=>{

let data=snap.val();

let html="<h3>Word list</h3>";

for(let id in data){

html+=data[id].text+"<br>";

}

document.getElementById("screen").innerHTML=html;

});

}

function showProgress(){

db.ref("history").once("value").then(snap=>{

let data=snap.val();

if(!data){
document.getElementById("screen").innerHTML="No history yet";
return;
}

let html="<h3>History</h3>";

for(let id in data){

html+=data[id].date+" : "+data[id].score+"<br>";

}

document.getElementById("screen").innerHTML=html;

});

}

</script>

</body>
</html>
