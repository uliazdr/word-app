<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vocab Trainer</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  // Firebase конфиг
  const firebaseConfig = {
    apiKey: "AIzaSyDTViLnfX1ZZQpGjS2ptVc0F9-lCsuGqM8",
    authDomain: "vocabtrainer-969fd.firebaseapp.com",
    projectId: "vocabtrainer-969fd",
    storageBucket: "vocabtrainer-969fd.firebasestorage.app",
    messagingSenderId: "991443793775",
    appId: "1:991443793775:web:0d044609e2b3eb4e611a9a",
    databaseURL: "https://vocabtrainer-969fd-default-rtdb.firebaseio.com"
  };

  // Инициализация Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

<style>
body{background:#f0faff;}
.screen{display:none;}
.screen.active{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:75vh;}
textarea{resize:none;}
</style>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="cat-icon.png">
<meta name="apple-mobile-web-app-title" content="Vocab Trainer">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#06b6d4">
</head>

<body class="min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-white rounded-[24px] shadow-xl p-6">

<!-- MENU -->
<div id="menu" class="screen active flex-col items-center">
  <h1 class="text-2xl font-bold text-blue-500 mb-4">Vocab Trainer</h1>
  <button id="startPractice" class="mb-2 w-full py-2 px-4 rounded-xl bg-cyan-500 text-white active:scale-95 transition">Start Practice</button>
  <button id="manageWords" class="mb-2 w-full py-2 px-4 rounded-xl bg-blue-500 text-white active:scale-95 transition">Manage Word List</button>
  <button id="showStats" class="w-full py-2 px-4 rounded-xl bg-cyan-600 text-white active:scale-95 transition">Progress</button>
  <div class="mt-4 text-center text-sm text-gray-600">Total Words: <span id="totalWords">0</span> | Hard Words: <span id="hardWords">0</span></div>
</div>

<!-- MANAGE WORDS -->
<div id="manage" class="screen flex-col items-center">
  <textarea id="bulkWords" class="w-full h-32 p-2 border rounded-lg mb-2" placeholder="Add words, comma or newline separated"></textarea>
  <button id="importWords" class="mb-2 w-full py-2 px-4 rounded-xl bg-cyan-500 text-white active:scale-95 transition">Save & Add</button>
  <div id="wordList" class="w-full max-h-48 overflow-y-auto mb-2"></div>
  <button id="backMenu" class="w-full py-2 px-4 rounded-xl bg-blue-500 text-white active:scale-95 transition">Back to Menu</button>
</div>

<!-- PREVIEW -->
<div id="preview" class="screen flex-col items-center">
  <h2 class="text-xl font-bold text-blue-500 mb-2">Preview Words</h2>
  <div id="previewList" class="w-full mb-2"></div>
  <button id="beginDictation" class="w-full py-2 px-4 rounded-xl bg-cyan-500 text-white active:scale-95 transition">Begin Dictation</button>
</div>

<!-- DICTATION -->
<div id="dictation" class="screen flex-col items-center">
  <div id="dictWord" class="text-3xl font-bold text-blue-600 mb-4"></div>
  <button id="nextWord" class="w-full py-2 px-4 rounded-xl bg-cyan-500 text-white active:scale-95 transition">Next</button>
</div>

<!-- REVIEW -->
<div id="review" class="screen flex-col items-center">
  <div id="reviewList" class="w-full mb-2"></div>
  <button id="finish" class="w-full py-2 px-4 rounded-xl bg-blue-500 text-white opacity-50" disabled>Save & Finish</button>
</div>

<!-- RESULTS -->
<div id="results" class="screen flex-col items-center">
  <h2 id="score" class="text-xl font-bold text-blue-600 mb-2">Score: 0/10</h2>
  <div class="text-lg mb-2">Well done! See you tomorrow!</div>
  <img id="rewardImage" class="w-full h-64 object-contain" src="" alt="Reward"/>
  <button id="backHome" class="mt-2 w-full py-2 px-4 rounded-xl bg-cyan-500 text-white active:scale-95 transition">Back to Menu</button>
</div>

<!-- STATS -->
<div id="stats" class="screen flex-col items-center">
  <canvas id="chart" width="300" height="150" class="border rounded-lg mb-2"></canvas>
  <button id="statsBack" class="w-full py-2 px-4 rounded-xl bg-blue-500 text-white active:scale-95 transition">Back to Menu</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", async ()=>{
  let words = [], history = [];
  let practice = [], marks = {}, current = 0;
  const rewardImages = ["1.png","2.png","3.png","4.png","5.png"];
  const USER_ID="defaultUser";

  // Load data
  const snapshot = await firebase.database().ref("users/"+USER_ID).get();
  if(snapshot.exists()){
    const data = snapshot.val();
    words = data.words || [];
    history = data.history || [];
  }

  function saveData(){ 
    firebase.database().ref("users/"+USER_ID).set({words,history}); 
  }

  function updateStats(){
    document.getElementById("totalWords").textContent = words.length;
    let hard = words.filter(w=>w.interval>7).length;
    document.getElementById("hardWords").textContent = hard;
  }
  updateStats();

  function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function getPracticeWords(){
    let due = words.filter(w=>!w.due || w.due <= Math.floor(Date.now()/86400000));
    let result = [...due];
    while(result.length<10 && words.length>0) result.push(words[Math.floor(Math.random()*words.length)]);
    return result.slice(0,10);
  }

  // MENU
  document.getElementById("startPractice").addEventListener("click",()=>{
    if(words.length===0) return alert("Add some words first!");
    practice = getPracticeWords();
    const list = document.getElementById("previewList");
    list.innerHTML="";
    practice.forEach(w=>list.innerHTML+=`<div>${w.text}</div>`);
    show("preview");
  });

  document.getElementById("manageWords").addEventListener("click",()=>{
    renderWordList();
    show("manage");
  });

  document.getElementById("showStats").addEventListener("click",()=>{
    drawChart();
    show("stats");
  });

  // MANAGE WORDS
  function renderWordList(){
    const list = document.getElementById("wordList"); list.innerHTML="";
    words.forEach((w,i)=>{
      const row = document.createElement("div");
      row.className="flex justify-between mb-1";
      row.innerHTML=`<span>${w.text}</span><button class="text-red-500">✕</button>`;
      row.querySelector("button").addEventListener("click",()=>{
        words.splice(i,1); saveData(); renderWordList(); updateStats();
      });
      list.appendChild(row);
    });
  }

  document.getElementById("importWords").addEventListener("click",()=>{
    const text = document.getElementById("bulkWords").value;
    text.split(/[\n,]/).map(w=>w.trim()).filter(Boolean).forEach(w=>{
      words.push({text:w, interval:1, ease:2.5, due:Math.floor(Date.now()/86400000)});
    });
    document.getElementById("bulkWords").value="";
    saveData(); renderWordList(); updateStats();
  });

  document.getElementById("backMenu").addEventListener("click",()=>show("menu"));

  // DICTATION
  document.getElementById("beginDictation").addEventListener("click",()=>{
    current=0; document.getElementById("dictWord").textContent=practice[current].text;
    show("dictation");
  });

  document.getElementById("nextWord").addEventListener("click",()=>{
    current++; 
    if(current<practice.length) document.getElementById("dictWord").textContent=practice[current].text;
    else buildReview();
  });

  // REVIEW
  function buildReview(){
    marks={};
    const box=document.getElementById("reviewList"); box.innerHTML="";
    practice.forEach((w,i)=>{
      const row=document.createElement("div");
      row.className="flex justify-between items-center mb-1";
      row.innerHTML=`<span>${w.text}</span>
        <div class="flex border rounded-lg overflow-hidden">
          <button class="good px-3 py-1 text-green-600">✓</button>
          <button class="bad px-3 py-1 text-red-600">✕</button>
        </div>`;
      const good=row.querySelector(".good"); 
      const bad=row.querySelector(".bad");
      good.addEventListener("click",()=>{
        marks[i]="good"; good.classList.add("bg-green-500","text-white"); bad.classList.remove("bg-red-500","text-white"); checkFinish();
      });
      bad.addEventListener("click",()=>{
        marks[i]="bad"; bad.classList.add("bg-red-500","text-white"); good.classList.remove("bg-green-500","text-white"); checkFinish();
      });
      box.appendChild(row);
    });
    show("review");
  }

  function checkFinish(){
    if(Object.keys(marks).length===practice.length){
      const btn=document.getElementById("finish"); 
      btn.disabled=false; btn.classList.remove("opacity-50");
    }
  }

  document.getElementById("finish").addEventListener("click",()=>{
    let score=0;
    practice.forEach((w,i)=>{
      if(!w.interval) w.interval=1;
      if(!w.ease) w.ease=2.5;
      if(marks[i]==="good"){ score++; w.interval=Math.round(w.interval*w.ease); w.ease+=0.1; }
      else{ w.interval=1; w.ease=Math.max(1.3,w.ease-0.2); }
      w.due=Math.floor(Date.now()/86400000)+w.interval;
    });
    history.push({date:Math.floor(Date.now()/86400000),score}); if(history.length>30) history.shift();
    saveData(); updateStats();
    document.getElementById("score").textContent=`Score: ${score}/10`;
    document.getElementById("rewardImage").src=rewardImages[Math.floor(Math.random()*rewardImages.length)];
    show("results");
  });

  document.getElementById("backHome").addEventListener("click",()=>show("menu"));

  // STATS
  function drawChart(){
    const canvas=document.getElementById("chart");
    const ctx=canvas.getContext("2d"); ctx.clearRect(0,0,canvas.width,canvas.height);
    const w=canvas.width; const h=canvas.height; const max=10;
    history.forEach((d,i)=>{
      const x=i*(w/30); const bar=h*(d.score/max);
      ctx.fillStyle="#06b6d4"; ctx.fillRect(x,h-bar,8,bar);
    });
  }

  document.getElementById("statsBack").addEventListener("click",()=>show("menu"));
});
</script>
</div>
</body>
</html>
