<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Trainer PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Тема: Свежий Голубой и Бирюзовый */
        body { 
            background-color: #f0f9ff; /* light cyan background */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        .card { background: white; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.03); }
        .btn { transition: all 0.15s ease-in-out; cursor: pointer; border-radius: 16px; font-weight: 600; }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        
        /* Цвета кнопок */
        .btn-primary { background-color: #06b6d4; color: white; } /* teal */
        .btn-primary:hover { background-color: #0891b2; }
        
        .btn-secondary { background-color: #e0f7fa; color: #0e7490; border: 2px solid #a5f3fc; } /* light teal */
        .btn-secondary:hover { background-color: #cffafe; }

        .btn-success { background-color: #22d3ee; color: white; } /* cyan */
        .btn-danger { background-color: #fee2e2; color: #b91c1c; border: 2px solid #fecaca; } /* light red for errors */
        
        /* Анимация блюра */
        #word-display { transition: filter 0.3s ease; }
    </style>
</head>
<body class="p-4 pt-8">
    <div id="app" class="max-w-md mx-auto">
        
        <div id="menu" class="space-y-8 text-center">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-500 to-blue-600 tracking-tight">Vocab<span class="font-light text-cyan-600">Trainer</span></h1>
            
            <div class="space-y-4">
                <button onclick="startDictation()" class="w-full py-8 btn-primary text-2xl shadow-cyan-200 shadow-lg btn">Start Practice</button>
                <button onclick="showSettings()" class="w-full py-4 btn-secondary btn">Settings & Word List</button>
            </div>
            
            <div id="stats" class="card p-4 text-cyan-800 text-sm font-medium bg-cyan-50"></div>
        </div>

        <div id="dictation" class="hidden space-y-8 text-center">
            <div class="card p-12 min-h-[200px] flex flex-col justify-center items-center relative border-2 border-cyan-100">
                <div id="word-display" class="text-5xl font-bold text-gray-900 mb-4 tracking-tight">Word</div>
                <button id="reveal-btn" onclick="revealWord()" class="text-cyan-500 underline text-sm font-medium">Tap to reveal</button>
            </div>
            
            <div class="flex gap-4">
                <button onclick="markWord('error')" class="flex-1 py-7 btn-danger text-lg btn">Got Errors</button>
                <button onclick="markWord('easy')" class="flex-1 py-7 btn-success text-lg btn">Too Easy</button>
            </div>
            
            <button onclick="stopDictation()" class="text-gray-400 text-sm font-medium hover:text-gray-600">Quit Session</button>
        </div>

        <div id="settings" class="hidden space-y-6">
            <div class="card p-6 border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Bulk Import</h2>
                <textarea id="mass-input" class="w-full p-4 border-2 border-cyan-100 rounded-xl h-28 mb-3 focus:border-cyan-300 focus:ring-0 text-sm" placeholder="Paste words separated by commas or new lines..."></textarea>
                <button onclick="importWords()" class="w-full py-3 btn-primary btn">Add to My List</button>
            </div>
            
            <div class="card p-6 border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">My Words (<span id="word-count" class="text-cyan-600">0</span>)</h2>
                    <button onclick="
