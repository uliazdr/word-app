<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vocab Trainer</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase модульный SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// Конфиг Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDTViLnfX1ZZQpGjS2ptVc0F9-lCsuGqM8",
  authDomain: "vocabtrainer-969fd.firebaseapp.com",
  projectId: "vocabtrainer-969fd",
  storageBucket: "vocabtrainer-969fd.firebasestorage.app",
  messagingSenderId: "991443793775",
  appId: "1:991443793775:web:0d044609e2b3eb4e611a9a",
  databaseURL: "https://vocabtrainer-969fd-default-rtdb.firebaseio.com"
};

// Инициализация
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const USER_ID = "defaultUser";

document.addEventListener("DOMContentLoaded", async ()=>{
  let words = [], history = [];
  let practice = [], marks = {}, current = 0;

  // ------------------ LOAD DATA ------------------
  async function loadData(){
    const snapshot = await get(child(ref(db), `users/${USER_ID}`));
    if(snapshot.exists()){
      const data = snapshot.val();
      words = data.words || [];
      history = data.history || [];
    }
    updateStats();
  }
  await loadData();

  async function saveData(){
    await set(ref(db, `users/${USER_ID}`), {words, history});
  }

  // ------------------ STATS ------------------
  function updateStats(){
    document.getElementById("totalWords").textContent = words.length;
    let hard = words.filter(w=>w.interval>7).length;
    document.getElementById("hardWords").textContent = hard;
  }

  // ------------------ SCREEN SWITCH ------------------
  function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // ------------------ REWARD IMAGES ------------------
  const rewardImages = ["1.png","2.png","3.png","4.png","5.png"];

  // ------------------ SPACED REPETITION ------------------
  function getPracticeWords(){
    let due = words.filter(w=>!w.due || w.due <= Math.floor(Date.now()/86400000));
    let result = [...due];
    while(result.length<10 && words.length>0) { 
      result.push(words[Math.floor(Math.random()*words.length)]); 
    }
    return result.slice(0,10);
  }

  // ------------------ MENU ------------------
  document.getElementById("startPractice").addEventListener("click",()=>{
    if(words.length===0) return alert("Add some words first!");
    practice = getPracticeWords();
    let list = document.getElementById("previewList");
    list.innerHTML = "";
    practice.forEach(w=>{ list.innerHTML+=`<div>${w.text}</div>`; });
    show("preview");
  });

  document.getElementById("manageWords").addEventListener("click",()=>{
    renderWordList();
    show("manage");
  });

  document.getElementById("showStats").addEventListener("click",()=>{
    drawChart();
    show("stats");
  });

  // ------------------ WORD MANAGEMENT ------------------
  function renderWordList(){
    const list = document.getElementById("wordList");
    list.innerHTML="";
    words.forEach((w,i)=>{
      const row = document.createElement("div");
      row.className="flex justify-between mb-1";
      row.innerHTML=`<span>${w.text}</span><button class="text-red-500">✕</button>`;
      row.querySelector("button").addEventListener("click", async ()=>{
        words.splice(i,1); await saveData(); renderWordList(); updateStats();
      });
      list.appendChild(row);
    });
  }

  document.getElementById("importWords").addEventListener("click", async ()=>{
    const text = document.getElementById("bulkWords").value;
    text.split(/[\n,]/).map(w=>w.trim()).filter(Boolean).forEach(w=>{
      words.push({text:w, interval:1, ease:2.5, due:Math.floor(Date.now()/86400000)});
    });
    document.getElementById("bulkWords").value="";
    await saveData(); renderWordList(); updateStats();
  });

  document.getElementById("backMenu").addEventListener("click",()=>show("menu"));

  // ------------------ DICTATION ------------------
  document.getElementById("beginDictation").addEventListener("click",()=>{
    current=0;
    document.getElementById("dictWord").textContent=practice[current].text;
    show("dictation");
  });
  document.getElementById("nextWord").addEventListener("click",()=>{
    current++;
    if(current<practice.length){
      document.getElementById("dictWord").textContent=practice[current].text;
    } else {
      buildReview();
    }
  });

  // ------------------ REVIEW ------------------
  function buildReview(){
    marks={};
    const box=document.getElementById("reviewList"); box.innerHTML="";
    practice.forEach((w,i)=>{
      const row=document.createElement("div"); 
      row.className="flex justify-between items-center";
      row.innerHTML=`<span>${w.text}</span>
        <div class="flex border rounded-lg overflow-hidden">
          <button class="good px-3 py-1 text-green-600">✓</button>
          <button class="bad px-3 py-1 text-red-600">✕</button>
        </div>`;
      const good=row.querySelector(".good"); 
      const bad=row.querySelector(".bad");
      good.addEventListener("click",()=>{
        marks[i]="good";
        good.classList.add("bg-green-500","text-white");
        bad.classList.remove("bg-red-500","text-white");
        checkFinish();
      });
      bad.addEventListener("click",()=>{
        marks[i]="bad";
        bad.classList.add("bg-red-500","text-white");
        good.classList.remove("bg-green-500","text-white");
        checkFinish();
      });
      box.appendChild(row);
    });
    show("review");
  }

  function checkFinish(){
    if(Object.keys(marks).length===practice.length){
      const btn=document.getElementById("finish"); 
      btn.disabled=false; btn.classList.remove("opacity-50");
    }
  }

  document.getElementById("finish").addEventListener("click", async ()=>{
    let score=0;
    practice.forEach((w,i)=>{
      if(!w.interval) w.interval=1;
      if(!w.ease) w.ease=2.5;
      if(marks[i]==="good"){ 
        score++; 
        w.interval=Math.round(w.interval*w.ease); 
        w.ease+=0.1;
      } else { 
        w.interval=1; 
        w.ease=Math.max(1.3,w.ease-0.2);
      }
      w.due=Math.floor(Date.now()/86400000)+w.interval;
    });
    history.push({date:Math.floor(Date.now()/86400000),score});
    if(history.length>30) history.shift();
    await saveData(); updateStats();
    document.getElementById("score").textContent=`Score: ${score}/10`;
    const img=rewardImages[Math.floor(Math.random()*rewardImages.length)];
    document.getElementById("rewardImage").src=img;
    show("results");
  });

  document.getElementById("backHome").addEventListener("click",()=>show("menu"));

  // ------------------ STATS ------------------
  function drawChart(){
    const canvas=document.getElementById("chart"); 
    const ctx=canvas.getContext("2d"); 
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const w=canvas.width; const h=canvas.height; const max=10;
    history.forEach((d,i)=>{
      const x=i*(w/30); 
      const bar=h*(d.score/max);
      ctx.fillStyle="#06b6d4"; 
      ctx.fillRect(x,h-bar,8,bar);
    });
  }

  document.getElementById("statsBack").addEventListener("click",()=>show("menu"));

});
</script>

<style>
body{background:#f0faff;}
.screen{display:none;}
.screen.active{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:65vh;}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-white rounded-[24px] shadow-xl p-6">

<!-- Здесь вставляется весь HTML интерфейс (как раньше) -->

</div>
</body>
</html>
