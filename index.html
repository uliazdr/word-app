<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vocab Trainer</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body{background:#f0faff}
.screen{display:none}
.screen.active{display:flex;flex-direction:column;justify-content:center;min-height:65vh}
</style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#06b6d4">
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-[24px] shadow-xl p-6">

<!-- LOGIN -->
<div id="loginScreen" class="screen active text-center">
<h1 class="text-2xl font-bold text-blue-600 mb-6">Vocab Trainer Login</h1>

<input id="loginEmail" type="email" placeholder="Email" class="w-full border rounded-lg p-2 mb-3">
<input id="loginPassword" type="password" placeholder="Password" class="w-full border rounded-lg p-2 mb-3">

<button id="loginBtn" class="w-full bg-cyan-500 text-white py-3 rounded-xl mb-4">
Login
</button>

<div id="loginError" class="text-red-500 text-sm"></div>
</div>

<!-- MENU -->
<div id="menu" class="screen text-center">

<h1 class="text-2xl font-bold text-blue-600 mb-6">Vocabulary Trainer</h1>

<button id="startPractice"
class="w-full bg-cyan-500 text-white py-3 rounded-xl mb-4">
Start Practice
</button>

<button id="manageWords"
class="w-full bg-blue-500 text-white py-3 rounded-xl mb-4">
Manage Word List
</button>

<div class="text-center text-sm text-gray-500 mt-6">
<div>Total Words: <span id="totalWords">0</span></div>
<div>Hard Words: <span id="hardWords">0</span></div>
</div>

</div>

<!-- MANAGE -->
<div id="manage" class="screen">

<h2 class="text-lg font-bold mb-3 text-center">Import Words</h2>

<textarea id="bulkWords"
class="w-full border rounded-lg p-2 h-24 mb-3"
placeholder="comma or new line separated"></textarea>

<button id="importWords"
class="w-full bg-cyan-500 text-white py-2 rounded-lg mb-4">
Import
</button>

<div id="wordList"
class="max-h-48 overflow-y-auto text-sm mb-4"></div>

<button id="backMenu"
class="w-full bg-gray-200 py-2 rounded-lg">
Back
</button>

</div>

<!-- PREVIEW -->
<div id="preview" class="screen text-center">

<h2 class="text-lg font-bold mb-4">Preview Words</h2>

<div id="previewList" class="mb-4"></div>

<button id="beginDictation"
class="w-full bg-cyan-500 text-white py-3 rounded-xl">
Start Dictation
</button>

</div>

<!-- DICTATION -->
<div id="dictation" class="screen text-center">

<div id="dictWord"
class="text-3xl font-bold text-blue-600 mb-6"></div>

<button id="nextWord"
class="w-full bg-cyan-500 text-white py-3 rounded-xl">
Next
</button>

</div>

<!-- REVIEW -->
<div id="review" class="screen">

<div id="reviewList"
class="space-y-2 mb-4"></div>

<button id="finish"
disabled
class="w-full bg-blue-500 text-white py-3 rounded-xl opacity-50">
Save & Finish
</button>

</div>

<!-- RESULTS -->
<div id="results" class="screen text-center">

<div class="mb-6">

<div id="score"
class="text-2xl font-bold text-blue-600 mb-2"></div>

<p>Well done! See you tomorrow!</p>

</div>

<img id="rewardImage"
class="w-full h-72 object-contain">

<button id="backHome"
class="w-full mt-6 bg-cyan-500 text-white py-3 rounded-xl active:scale-95">
Back to Menu
</button>

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

let words=[]
let history=[]
let practice=[]
let marks={}
let current=0

// FIREBASE CONFIG (NEW KEY)

const firebaseConfig={
apiKey:"AIzaSyDJRe201hVZmoYlp7DZLLmXv_adnHRXmZs",
authDomain:"vocabtrainer-969fd.firebaseapp.com",
databaseURL:"https://vocabtrainer-969fd-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"vocabtrainer-969fd",
storageBucket:"vocabtrainer-969fd.appspot.com",
messagingSenderId:"991443793775",
appId:"1:991443793775:web:0d044609e2b3eb4e611a9a"
}

firebase.initializeApp(firebaseConfig)

firebase.auth().onAuthStateChanged(user=>{
  if(user){
    loadData()
    show("menu")
  }
})
  
// LOGIN

document.getElementById("loginBtn").onclick=()=>{

let email=document.getElementById("loginEmail").value
let pass=document.getElementById("loginPassword").value

firebase.auth()
.signInWithEmailAndPassword(email,pass)
.then(()=>{

loadData()
show("menu")

})
.catch(e=>{

document.getElementById("loginError").textContent=e.message

})

}

// LOAD

function loadData(){

firebase.database().ref("words").once("value")
.then(s=>{

if(s.val())words=s.val()

updateStats()
renderWordList()

})

firebase.database().ref("history").once("value")
.then(s=>{

if(s.val())history=s.val()

})

}

// SAVE

function save(){

firebase.database().ref("words").set(words)
firebase.database().ref("history").set(history)

}

// UI

function show(id){

document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id)
.classList.add("active")

}

function today(){

return Math.floor(Date.now()/86400000)

}

function updateStats(){

document.getElementById("totalWords").textContent=words.length

let hard=words.filter(w=>w.mistakes>0).length

document.getElementById("hardWords").textContent=hard

}

// PRACTICE

function getPracticeWords(){

let due=words.filter(w=>!w.due||w.due<=today())

let result=[...due]

while(result.length<10){

result.push(words[Math.floor(Math.random()*words.length)])

}

return result.slice(0,10)

}

// START PRACTICE

document.getElementById("startPractice").onclick=()=>{

if(words.length===0)return

practice=getPracticeWords()

let list=document.getElementById("previewList")

list.innerHTML=""

practice.forEach(w=>{

list.innerHTML+=`<div>${w.text}</div>`

})

show("preview")

}

// DICTATION

document.getElementById("beginDictation").onclick=()=>{

current=0

document.getElementById("dictWord").textContent=practice[current].text

show("dictation")

}

document.getElementById("nextWord").onclick=()=>{

current++

if(current<practice.length){

document.getElementById("dictWord").textContent=practice[current].text

}else{

buildReview()

}

}

// REVIEW

function buildReview(){

marks={}

let box=document.getElementById("reviewList")

box.innerHTML=""

practice.forEach((w,i)=>{

let row=document.createElement("div")

row.className="flex justify-between items-center"

row.innerHTML=`
<span>${w.text}</span>
<div class="flex border rounded-lg overflow-hidden">
<button class="good px-3 py-1 text-green-600">✓</button>
<button class="bad px-3 py-1 text-red-600">✕</button>
</div>
`

let good=row.querySelector(".good")
let bad=row.querySelector(".bad")

good.onclick=()=>{

marks[i]="good"
good.classList.add("bg-green-500","text-white")
bad.classList.remove("bg-red-500","text-white")
checkFinish()

}

bad.onclick=()=>{

marks[i]="bad"
bad.classList.add("bg-red-500","text-white")
good.classList.remove("bg-green-500","text-white")
checkFinish()

}

box.appendChild(row)

})

show("review")

}

function checkFinish(){

if(Object.keys(marks).length===practice.length){

let btn=document.getElementById("finish")

btn.disabled=false
btn.classList.remove("opacity-50")

}

}

// FINISH

document.getElementById("finish").onclick=()=>{

let score=0

practice.forEach((w,i)=>{

if(!w.interval)w.interval=1
if(!w.ease)w.ease=2.5
if(!w.mistakes)w.mistakes=0

if(marks[i]=="good"){

score++

w.interval=Math.round(w.interval*w.ease)
w.ease+=0.1

}else{

w.interval=1
w.ease=Math.max(1.3,w.ease-0.2)
w.mistakes++

}

w.due=today()+w.interval

})

history.push({date:today(),score:score})

if(history.length>30)history.shift()

save()

updateStats()

document.getElementById("score").textContent=`Score: ${score}/10`

show("results")

}

// WORDS

document.getElementById("manageWords").onclick=()=>{

renderWordList()

show("manage")

}

function renderWordList(){

let list=document.getElementById("wordList")

list.innerHTML=""

words.forEach((w,i)=>{

let row=document.createElement("div")

row.className="flex justify-between mb-1"

row.innerHTML=`<span>${w.text}</span><button class="text-red-500">✕</button>`

row.querySelector("button").onclick=()=>{

words.splice(i,1)

save()

renderWordList()

updateStats()

}

list.appendChild(row)

})

}

// IMPORT

document.getElementById("importWords").onclick=()=>{

let text=document.getElementById("bulkWords").value

text.split(/[\n,]/)
.map(w=>w.trim())
.filter(Boolean)
.forEach(w=>words.push({text:w,interval:1,ease:2.5,due:today(),mistakes:0}))

document.getElementById("bulkWords").value=""

save()

renderWordList()

updateStats()

}

document.getElementById("backMenu").onclick=()=>show("menu")
document.getElementById("backHome").onclick=()=>show("menu")

})

</script>

</body>
</html>
