<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Trainer</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f0faff] min-h-screen flex items-center justify-center p-4 font-sans">

<div class="w-full max-w-md">

<!-- MAIN CARD -->
<div class="bg-white rounded-[22px] shadow-xl p-6">

<!-- ================= MAIN MENU ================= -->
<div id="screenMenu">

<h1 class="text-2xl font-bold text-center text-blue-600 mb-6">
Vocabulary Trainer
</h1>

<div class="space-y-4">

<button id="startBtn"
class="w-full bg-blue-500 text-white py-4 rounded-xl font-semibold active:scale-95 transition">
Start Practice
</button>

<button id="manageBtn"
class="w-full bg-cyan-600 text-white py-4 rounded-xl font-semibold active:scale-95 transition">
Manage Word List
</button>

</div>

<div class="mt-8 text-center text-sm text-gray-600">
<div>Total Words: <span id="statTotal">0</span></div>
<div>Hard Words: <span id="statHard">0</span></div>
</div>

</div>


<!-- ================= MANAGE WORDS ================= -->
<div id="screenManage" class="hidden">

<h2 class="text-xl font-bold text-blue-600 mb-4 text-center">
Manage Words
</h2>

<textarea id="bulkInput"
placeholder="Paste words separated by comma or new line"
class="w-full border rounded-xl p-3 mb-4 text-sm"></textarea>

<button id="importBtn"
class="w-full bg-blue-500 text-white py-3 rounded-xl mb-4 active:scale-95 transition">
Import Words
</button>

<div id="wordList"
class="max-h-60 overflow-y-auto border rounded-xl p-2 text-sm mb-4"></div>

<button id="backFromManage"
class="w-full bg-gray-300 py-3 rounded-xl active:scale-95 transition">
Back
</button>

</div>


<!-- ================= PREVIEW ================= -->
<div id="screenPreview" class="hidden">

<h2 class="text-xl font-bold text-blue-600 mb-4 text-center">
Words Preview
</h2>

<ul id="previewList" class="list-disc pl-6 text-gray-700 mb-6"></ul>

<button id="startDictationBtn"
class="w-full bg-blue-500 text-white py-3 rounded-xl active:scale-95 transition">
Start Dictation
</button>

</div>


<!-- ================= DICTATION ================= -->
<div id="screenDictation" class="hidden text-center">

<div id="dictWord"
class="text-3xl font-bold text-blue-600 mb-6"></div>

<button id="nextWordBtn"
class="w-full bg-cyan-600 text-white py-3 rounded-xl active:scale-95 transition">
Next
</button>

</div>


<!-- ================= REVIEW ================= -->
<div id="screenReview" class="hidden">

<h2 class="text-xl font-bold text-blue-600 mb-4 text-center">
Review
</h2>

<div id="reviewList" class="space-y-2 mb-4"></div>

<button id="finishBtn"
disabled
class="w-full bg-blue-500 text-white py-3 rounded-xl opacity-50 active:scale-95 transition">
Save & Finish
</button>

</div>


<!-- ================= RESULTS ================= -->
<div id="screenResults" class="hidden text-center">

<h2 class="text-2xl font-bold text-blue-600 mb-2">
Results
</h2>

<div id="scoreText" class="text-lg mb-4"></div>

<div class="flex justify-center mb-4">

<svg width="120" height="120" viewBox="0 0 120 120">
<circle cx="60" cy="60" r="50" fill="#22d3ee"/>
<circle cx="40" cy="55" r="6"/>
<circle cx="80" cy="55" r="6"/>
<path d="M40 75 Q60 90 80 75" stroke="black" stroke-width="4" fill="none"/>
<polygon points="30,20 45,40 20,40" fill="#22d3ee"/>
<polygon points="90,20 75,40 100,40" fill="#22d3ee"/>
</svg>

</div>

<p class="text-gray-700 mb-6">
Well done! See you tomorrow!
</p>

<button id="backHomeBtn"
class="w-full bg-blue-500 text-white py-3 rounded-xl active:scale-95 transition">
Back to Menu
</button>

</div>

</div>
</div>



<script>

document.addEventListener("DOMContentLoaded", () => {

const STORAGE_KEY = "vocabTrainerWords";

let words = [];
let practiceWords = [];
let reviewMarks = {};
let dictIndex = 0;



function loadWords(){
words = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
updateStats();
renderWordList();
}

function saveWords(){
localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
updateStats();
}

function updateStats(){

document.getElementById("statTotal").textContent = words.length;

const hard = words.filter(w=>w.weight>2).length;

document.getElementById("statHard").textContent = hard;

}



function showScreen(id){

document.querySelectorAll("[id^=screen]").forEach(s=>{
s.classList.add("hidden");
});

document.getElementById(id).classList.remove("hidden");

}



function renderWordList(){

const list = document.getElementById("wordList");
list.innerHTML = "";

words.forEach((w,i)=>{

const row = document.createElement("div");

row.className="flex justify-between items-center p-2";

row.innerHTML=`
<span>${w.text}</span>
<button class="text-red-500">✕</button>
`;

row.querySelector("button").addEventListener("click",()=>{
words.splice(i,1);
saveWords();
renderWordList();
});

list.appendChild(row);

});

}



function importWords(){

const raw = document.getElementById("bulkInput").value;

const parts = raw.split(/[\n,]+/).map(w=>w.trim()).filter(Boolean);

parts.forEach(w=>{
words.push({text:w,weight:1});
});

saveWords();
renderWordList();

document.getElementById("bulkInput").value="";

}



function weightedRandom(){

const pool=[];

words.forEach(w=>{
for(let i=0;i<w.weight;i++) pool.push(w);
});

const result=[];

while(result.length<10 && pool.length){

const pick = pool[Math.floor(Math.random()*pool.length)];

if(!result.includes(pick)) result.push(pick);

}

return result;

}



function startPractice(){

if(words.length<1) return;

practiceWords = weightedRandom();

showPreview();

}



function showPreview(){

const ul = document.getElementById("previewList");

ul.innerHTML="";

practiceWords.forEach(w=>{
const li=document.createElement("li");
li.textContent=w.text;
ul.appendChild(li);
});

showScreen("screenPreview");

}



function startDictation(){

dictIndex=0;

showScreen("screenDictation");

showCurrentWord();

}



function showCurrentWord(){

document.getElementById("dictWord").textContent = practiceWords[dictIndex].text;

}



function nextWord(){

dictIndex++;

if(dictIndex>=practiceWords.length){

showReview();

return;

}

showCurrentWord();

}



function showReview(){

const list = document.getElementById("reviewList");

list.innerHTML="";

reviewMarks={};

practiceWords.forEach((w,i)=>{

const row=document.createElement("div");

row.className="flex justify-between items-center";

row.innerHTML=`
<span>${w.text}</span>
<div class="space-x-2">
<button class="correct bg-green-500 text-white px-3 py-1 rounded">✓</button>
<button class="wrong bg-red-500 text-white px-3 py-1 rounded">✕</button>
</div>
`;

const correctBtn=row.querySelector(".correct");
const wrongBtn=row.querySelector(".wrong");

correctBtn.addEventListener("click",()=>{
reviewMarks[i]="correct";
updateFinish();
});

wrongBtn.addEventListener("click",()=>{
reviewMarks[i]="wrong";
updateFinish();
});

list.appendChild(row);

});

showScreen("screenReview");

}



function updateFinish(){

const btn=document.getElementById("finishBtn");

if(Object.keys(reviewMarks).length===practiceWords.length){

btn.disabled=false;
btn.classList.remove("opacity-50");

}

}



function finishPractice(){

let correct=0;

practiceWords.forEach((w,i)=>{

const mark=reviewMarks[i];

const original = words.find(x=>x.text===w.text);

if(mark==="correct"){

correct++;
original.weight=Math.max(1, original.weight-1);

}else{

original.weight+=2;

}

});

saveWords();

showResults(correct);

}



function showResults(score){

document.getElementById("scoreText").textContent =
score + " / " + practiceWords.length;

showScreen("screenResults");

}



/* EVENT LISTENERS */

document.getElementById("manageBtn").addEventListener("click",()=>{
showScreen("screenManage");
});

document.getElementById("backFromManage").addEventListener("click",()=>{
showScreen("screenMenu");
});

document.getElementById("importBtn").addEventListener("click",importWords);

document.getElementById("startBtn").addEventListener("click",startPractice);

document.getElementById("startDictationBtn").addEventListener("click",startDictation);

document.getElementById("nextWordBtn").addEventListener("click",nextWord);

document.getElementById("finishBtn").addEventListener("click",finishPractice);

document.getElementById("backHomeBtn").addEventListener("click",()=>{
showScreen("screenMenu");
});



loadWords();

});

</script>

</body>
</html>
