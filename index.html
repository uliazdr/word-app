<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Vocab Trainer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f0faff}
.screen{display:none}
.screen.active{display:block}
</style>

</head>

<body class="flex justify-center pt-10 p-4">

<div class="w-full max-w-md bg-white rounded-[24px] shadow-xl p-6">

<!-- MENU -->

<div id="menu" class="screen active">

<h1 class="text-2xl font-bold text-center text-blue-600 mb-6">
Vocabulary Trainer
</h1>

<button id="startPractice"
class="w-full bg-cyan-500 text-white py-3 rounded-xl mb-4 active:scale-95 transition">
Start Practice
</button>

<button id="manageWords"
class="w-full bg-blue-500 text-white py-3 rounded-xl active:scale-95 transition">
Manage Word List
</button>

<div class="text-center text-sm text-gray-500 mt-6">

<div>Total Words: <span id="totalWords">0</span></div>
<div>Hard Words: <span id="hardWords">0</span></div>

</div>

</div>


<!-- MANAGE WORDS -->

<div id="manage" class="screen">

<h2 class="text-lg font-bold mb-3">Import Words</h2>

<textarea id="bulkWords"
class="w-full border rounded-lg p-2 h-24 mb-3"
placeholder="comma or new line separated"></textarea>

<button id="importWords"
class="w-full bg-cyan-500 text-white py-2 rounded-lg mb-4 active:scale-95">
Import
</button>

<div id="wordList"
class="max-h-48 overflow-y-auto text-sm mb-4"></div>

<button id="backMenu"
class="w-full bg-gray-200 py-2 rounded-lg active:scale-95">
Back
</button>

</div>


<!-- PREVIEW -->

<div id="preview" class="screen">

<h2 class="text-lg font-bold mb-4 text-center">
Preview Words
</h2>

<div id="previewList" class="mb-4 text-center"></div>

<button id="beginDictation"
class="w-full bg-cyan-500 text-white py-3 rounded-xl active:scale-95">
Start Dictation
</button>

</div>


<!-- DICTATION -->

<div id="dictation" class="screen text-center">

<div id="dictWord"
class="text-3xl font-bold text-blue-600 mb-6"></div>

<button id="nextWord"
class="w-full bg-cyan-500 text-white py-3 rounded-xl active:scale-95">
Next
</button>

</div>


<!-- REVIEW -->

<div id="review" class="screen">

<div id="reviewList"
class="space-y-2 mb-4"></div>

<button id="finish"
disabled
class="w-full bg-blue-500 text-white py-3 rounded-xl opacity-50">
Save & Finish
</button>

</div>


<!-- RESULTS -->

<div id="results" class="screen text-center">

<div class="mb-6">

<div id="score"
class="text-2xl font-bold text-blue-600 mb-2"></div>

<p>Well done! See you tomorrow!</p>

</div>

<img id="rewardImage"
class="w-full h-72 object-contain">

<button id="backHome"
class="w-full mt-6 bg-cyan-500 text-white py-3 rounded-xl active:scale-95">
Back to Menu
</button>

</div>

</div>


<script>

document.addEventListener("DOMContentLoaded",()=>{

let words=JSON.parse(localStorage.getItem("words")||"[]")

let practice=[]
let marks={}
let current=0

function save(){
localStorage.setItem("words",JSON.stringify(words))
}

function show(id){

document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id)
.classList.add("active")

}

function updateStats(){

document.getElementById("totalWords").textContent=words.length

let hard=words.filter(w=>w.weight>3).length

document.getElementById("hardWords").textContent=hard

}

updateStats()


/* REWARD IMAGES */

const rewardImages=[

"1.png",
"2.png",
"3.png",
"4.png",
"5.png"

]


/* START PRACTICE */

document.getElementById("startPractice")
.addEventListener("click",()=>{

if(words.length===0)return

practice=[]

for(let i=0;i<10;i++){

let pool=[]

words.forEach(w=>{
for(let j=0;j<(w.weight||1);j++)pool.push(w)
})

practice.push(pool[Math.floor(Math.random()*pool.length)])

}

let list=document.getElementById("previewList")

list.innerHTML=""

practice.forEach(w=>{
list.innerHTML+=`<div>${w.text}</div>`
})

show("preview")

})


/* BEGIN DICTATION */

document.getElementById("beginDictation")
.addEventListener("click",()=>{

current=0

document.getElementById("dictWord")
.textContent=practice[current].text

show("dictation")

})


/* NEXT WORD */

document.getElementById("nextWord")
.addEventListener("click",()=>{

current++

if(current<practice.length){

document.getElementById("dictWord")
.textContent=practice[current].text

}else{

buildReview()

}

})


/* REVIEW */

function buildReview(){

marks={}

let box=document.getElementById("reviewList")

box.innerHTML=""

practice.forEach((w,i)=>{

let row=document.createElement("div")

row.className="flex justify-between items-center"

row.innerHTML=`
<span>${w.text}</span>

<div class="flex border rounded-lg overflow-hidden">

<button class="good px-3 py-1 text-green-600">✓</button>
<button class="bad px-3 py-1 text-red-600">✕</button>

</div>
`

const good=row.querySelector(".good")
const bad=row.querySelector(".bad")

good.addEventListener("click",()=>{

marks[i]="good"

good.classList.add("bg-green-500","text-white")
bad.classList.remove("bg-red-500","text-white")

checkFinish()

})

bad.addEventListener("click",()=>{

marks[i]="bad"

bad.classList.add("bg-red-500","text-white")
good.classList.remove("bg-green-500","text-white")

checkFinish()

})

box.appendChild(row)

})

show("review")

}


function checkFinish(){

if(Object.keys(marks).length===practice.length){

const btn=document.getElementById("finish")

btn.disabled=false
btn.classList.remove("opacity-50")

}

}


/* FINISH */

document.getElementById("finish")
.addEventListener("click",()=>{

let score=0

practice.forEach((w,i)=>{

if(marks[i]==="good"){

score++
w.weight=Math.max(1,(w.weight||1)-1)

}else{

w.weight=(w.weight||1)+2

}

})

save()
updateStats()

document.getElementById("score")
.textContent=`Score: ${score}/10`

let img=
rewardImages[Math.floor(Math.random()*rewardImages.length)]

document.getElementById("rewardImage").src=img

show("results")

})


/* WORD MANAGEMENT */

document.getElementById("manageWords")
.addEventListener("click",()=>{

renderWordList()

show("manage")

})


function renderWordList(){

let list=document.getElementById("wordList")

list.innerHTML=""

words.forEach((w,i)=>{

let row=document.createElement("div")

row.className="flex justify-between mb-1"

row.innerHTML=`
<span>${w.text}</span>
<button class="text-red-500">✕</button>
`

row.querySelector("button")
.addEventListener("click",()=>{

words.splice(i,1)

save()
renderWordList()
updateStats()

})

list.appendChild(row)

})

}


document.getElementById("importWords")
.addEventListener("click",()=>{

let text=document.getElementById("bulkWords").value

text.split(/[\n,]/)
.map(w=>w.trim())
.filter(Boolean)
.forEach(w=>words.push({text:w,weight:1}))

document.getElementById("bulkWords").value=""

save()
renderWordList()
updateStats()

})


document.getElementById("backMenu")
.addEventListener("click",()=>show("menu"))

document.getElementById("backHome")
.addEventListener("click",()=>show("menu"))

})

</script>

</body>
</html>
