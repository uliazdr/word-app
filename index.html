<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vocab Trainer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
body{background:#f0faff;}
.screen{display:none;}
.screen.active{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:65vh;}
.word-item{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:4px;}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#06b6d4">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-white rounded-[24px] shadow-xl p-6">

  <!-- Start Screen -->
  <div id="startScreen" class="screen active flex flex-col gap-4">
    <h1 class="text-2xl font-bold text-blue-500">Vocab Trainer</h1>
    <button id="startPracticeBtn" class="bg-cyan-500 hover:bg-cyan-600 text-white py-3 rounded-lg active:scale-95 transition">Start Practice</button>
    <button id="manageWordsBtn" class="bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg active:scale-95 transition">Manage Word List</button>
    <button id="showProgressBtn" class="bg-teal-400 hover:bg-teal-500 text-white py-2 rounded-lg active:scale-95 transition mt-2">📊 Progress</button>
    <div class="mt-4 flex justify-between w-full text-sm">
      <span>Total Words: <span id="totalWords">0</span></span>
      <span>Hard Words: <span id="hardWords">0</span></span>
    </div>
  </div>

  <!-- Manage Words Screen -->
  <div id="manageScreen" class="screen flex flex-col gap-4 w-full">
    <h2 class="text-xl font-bold text-blue-500">Manage Words</h2>
    <textarea id="wordInput" class="border p-2 w-full h-32 rounded-lg" placeholder="Add words, one per line"></textarea>
    <button id="saveWordsBtn" class="bg-cyan-500 hover:bg-cyan-600 text-white py-2 rounded-lg active:scale-95 transition">Save & Add</button>
    <div id="wordList" class="overflow-y-auto max-h-48 mt-2"></div>
    <button id="backFromManage" class="bg-gray-300 text-black py-2 rounded-lg active:scale-95 transition mt-2">Back</button>
  </div>

  <!-- Practice Placeholder -->
  <div id="practiceScreen" class="screen flex flex-col gap-4 w-full">
    <h2 class="text-xl font-bold text-blue-500">Practice</h2>
    <div id="practiceWord" class="text-3xl font-bold text-center my-4"></div>
    <button id="nextWordBtn" class="bg-cyan-500 hover:bg-cyan-600 text-white py-3 rounded-lg active:scale-95 transition">Next</button>
  </div>

  <!-- Review Placeholder -->
  <div id="reviewScreen" class="screen flex flex-col gap-4 w-full">
    <h2 class="text-xl font-bold text-blue-500">Review</h2>
    <div id="reviewList" class="w-full"></div>
    <button id="finishReviewBtn" class="bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg active:scale-95 transition mt-2" disabled>Finish</button>
  </div>

  <!-- Progress Placeholder -->
  <div id="progressScreen" class="screen flex flex-col gap-4 w-full">
    <h2 class="text-xl font-bold text-blue-500">Progress Over Time</h2>
    <canvas id="progressChart"></canvas>
    <button id="backFromProgress" class="bg-gray-300 text-black py-2 rounded-lg active:scale-95 transition mt-2">Back</button>
  </div>

</div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDTViLnfX1ZZQpGjS2ptVc0F9-lCsuGqM8",
  authDomain: "vocabtrainer-969fd.firebaseapp.com",
  databaseURL: "https://vocabtrainer-969fd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "vocabtrainer-969fd",
  storageBucket: "vocabtrainer-969fd.appspot.com",
  messagingSenderId: "991443793775",
  appId: "1:991443793775:web:0d044609e2b3eb4e611a9a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Screens
const startScreen = document.getElementById("startScreen");
const manageScreen = document.getElementById("manageScreen");
const practiceScreen = document.getElementById("practiceScreen");
const reviewScreen = document.getElementById("reviewScreen");
const progressScreen = document.getElementById("progressScreen");

// Buttons
const startPracticeBtn = document.getElementById("startPracticeBtn");
const manageWordsBtn = document.getElementById("manageWordsBtn");
const showProgressBtn = document.getElementById("showProgressBtn");
const backFromManage = document.getElementById("backFromManage");
const backFromProgress = document.getElementById("backFromProgress");

// Manage Words
const wordInput = document.getElementById("wordInput");
const saveWordsBtn = document.getElementById("saveWordsBtn");
const wordList = document.getElementById("wordList");

// Show/Hide
function showScreen(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  screen.classList.add('active');
}

// Load words from Firebase
function loadWords(){
  db.ref('words').once('value', snapshot=>{
    const data = snapshot.val() || [];
    wordList.innerHTML = '';
    let hardCount = 0;
    data.forEach((w,i)=>{
      const div = document.createElement('div');
      div.className = 'word-item';
      div.innerHTML = `
        <span>${w.text}</span>
        <button data-index="${i}" class="deleteWordBtn text-red-500 font-bold">X</button>
      `;
      wordList.appendChild(div);
      if(w.interval>3) hardCount++;
    });
    document.getElementById('totalWords').textContent = data.length;
    document.getElementById('hardWords').textContent = hardCount;

    document.querySelectorAll('.deleteWordBtn').forEach(btn=>{
      btn.addEventListener('click', e=>{
        const idx = parseInt(e.target.dataset.index);
        data.splice(idx,1);
        db.ref('words').set(data);
        loadWords();
      });
    });
  });
}

// Save words
saveWordsBtn.addEventListener('click', ()=>{
  const lines = wordInput.value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  if(lines.length===0) return;
  db.ref('words').once('value', snapshot=>{
    const data = snapshot.val() || [];
    lines.forEach(t=>{
      data.push({text:t, interval:1, ease:2.5, due:Math.floor(Date.now()/86400000)});
    });
    db.ref('words').set(data);
    wordInput.value='';
    loadWords();
  });
});

// Buttons
startPracticeBtn.addEventListener('click', ()=>{ alert('Practice starts!'); });
manageWordsBtn.addEventListener('click', ()=>{ showScreen(manageScreen); loadWords(); });
showProgressBtn.addEventListener('click', ()=>{ showScreen(progressScreen); });
backFromManage.addEventListener('click', ()=>showScreen(startScreen));
backFromProgress.addEventListener('click', ()=>showScreen(startScreen));
</script>
</body>
</html>
